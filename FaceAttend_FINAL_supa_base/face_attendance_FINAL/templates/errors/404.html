{% extends "base.html" %}
{% block title %}404{% endblock %}
{% block breadcrumb %}Error 404{% endblock %}
{% block content %}
<div class="coming-soon-wrapper">
  <div class="coming-soon-card animate-in">
    <div class="coming-soon-icon" style="color:var(--red)"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <h2 class="coming-soon-title">404 — Page Not Found</h2>
    <p class="coming-soon-text">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('dashboard') }}" class="btn-icon-primary">
      <i class="bi bi-house-fill me-2"></i>Go to Dashboard
    </a>
  </div>
</div>
{% endblock %}
