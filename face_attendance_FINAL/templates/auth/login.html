<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FaceAttend — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <style>
    body { background: var(--bg-base); display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Poppins',sans-serif; margin:0; }
    .login-wrap { width:100%; max-width:420px; padding:24px; }
    .login-card { background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:44px 40px; box-shadow:0 24px 64px rgba(0,0,0,.4); }
    .brand-row { text-align:center; margin-bottom:36px; }
    .brand-icon-lg { width:64px; height:64px; border-radius:18px; background:var(--accent-gradient); display:inline-flex; align-items:center; justify-content:center; font-size:28px; color:#fff; margin-bottom:16px; box-shadow:0 8px 24px rgba(255,148,82,.35); }
    .brand-title { font-size:24px; font-weight:700; color:var(--text-primary); margin:0; }
    .brand-sub { font-size:13px; color:var(--text-muted); margin:4px 0 0; }
    .field-label { font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:8px; display:block; }
    .login-input { width:100%; background:var(--bg-elevated); border:1px solid var(--border-color); border-radius:var(--radius-sm); color:var(--text-primary); padding:13px 16px; font-size:14px; font-family:'Poppins',sans-serif; outline:none; transition:border-color .2s; }
    .login-input:focus { border-color:var(--accent); }
    .login-btn { width:100%; background:var(--accent-gradient); border:none; border-radius:var(--radius-sm); color:#fff; font-size:15px; font-weight:600; font-family:'Poppins',sans-serif; padding:14px; cursor:pointer; margin-top:8px; transition:opacity .2s,transform .1s; }
    .login-btn:hover { opacity:.9; transform:translateY(-1px); }
    .error-box { background:rgba(255,92,92,.1); border:1px solid rgba(255,92,92,.3); border-radius:var(--radius-sm); color:var(--red); padding:12px 16px; font-size:13px; margin-bottom:20px; display:flex; align-items:center; gap:10px; }
    .hint-box { background:var(--bg-elevated); border:1px solid var(--border-subtle); border-radius:var(--radius-sm); padding:12px 16px; font-size:12px; color:var(--text-muted); margin-top:20px; text-align:center; }
    .hint-box code { color:var(--accent); background:rgba(255,148,82,.12); padding:2px 7px; border-radius:4px; font-size:12px; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand-row">
      <div class="brand-icon-lg"><i class="bi bi-camera-video-fill"></i></div>
      <h1 class="brand-title">FaceAttend</h1>
      <p class="brand-sub">BCA Final Year Project — Admin Login</p>
    </div>

    {% if error %}
    <div class="error-box">
      <i class="bi bi-exclamation-triangle-fill"></i>{{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div style="margin-bottom:20px">
        <label class="field-label">Username</label>
        <input type="text" name="username" class="login-input"
               placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div style="margin-bottom:24px">
        <label class="field-label">Password</label>
        <input type="password" name="password" class="login-input"
               placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="login-btn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login to Dashboard
      </button>
    </form>

    <div class="hint-box">
      Default credentials &nbsp;·&nbsp;
      Username: <code>admin</code> &nbsp; Password: <code>admin123</code>
    </div>
  </div>
</div>
</body>
</html>
